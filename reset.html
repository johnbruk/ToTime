<!doctype html>
<html lang="it" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7C89A6" />
  <title>TOTIME · Nuova password</title>
  <link rel="icon" href="assets/TOTIME_logo_only.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="authScreen"><div class="authBox">
    <img class="authLogo" src="assets/TOTIME_logo_only.png" alt="TOTIME" />
    <h1>Imposta nuova password</h1>
    <p class="sub" id="intro">Scegli una nuova password per il tuo account TOTIME.</p>
    <p class="small" id="msg" style="display:none"></p>
    <div class="card authCard">
      <form class="form" id="resetForm">
        <div class="field"><label>Nuova password</label><input id="pw" type="password" placeholder="Almeno 6 caratteri" minlength="6" autocomplete="new-password" required></div>
        <div class="field"><label>Conferma password</label><input id="pw2" type="password" placeholder="Ripeti la password" minlength="6" autocomplete="new-password" required></div>
        <button class="primary" id="btn" type="submit">Salva nuova password</button>
      </form>
    </div>
    <p class="sub authSwitch"><a href="index.html">Torna al login</a></p>
  </div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY } from './src/app-utils.js';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');
    const showMsg = (t) => { msg.textContent = t; msg.style.display = 'block'; };

    // La sessione di recovery viene stabilita automaticamente dal token nell'URL
    // (detectSessionInUrl). Questa pagina mostra SEMPRE il form: nessuna race condition.
    let recoveryReady = false;
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' || session) recoveryReady = true;
    });

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      if (pw !== pw2) { showMsg('Le due password non coincidono.'); return; }
      if (pw.length < 6) { showMsg('La password deve avere almeno 6 caratteri.'); return; }
      btn.disabled = true; showMsg('Salvataggio in corso...');

      // Assicura che la sessione di recovery sia pronta prima di aggiornare la password
      let { data: { session } } = await sb.auth.getSession();
      if (!session && !recoveryReady) {
        await new Promise(r => setTimeout(r, 1000));
        ({ data: { session } } = await sb.auth.getSession());
      }

      const { error } = await sb.auth.updateUser({ password: pw });
      if (error) {
        btn.disabled = false;
        showMsg('Errore: ' + error.message + ' — Il link potrebbe essere scaduto o usato. Richiedi un nuovo reset dalla pagina di login.');
        return;
      }
      await sb.auth.signOut();
      window.location.href = 'index.html?reset=done';
    });
  </script>
</body>
</html>
